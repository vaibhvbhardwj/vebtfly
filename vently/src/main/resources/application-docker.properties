# Docker-specific overrides — env vars are injected by docker-compose
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://ventfly.com,https://www.ventfly.com}
