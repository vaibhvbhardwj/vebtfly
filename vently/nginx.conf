# Nginx config for Vently — proxies to Docker containers
# Place at: /etc/nginx/sites-available/vently
# sudo ln -s /etc/nginx/sites-available/vently /etc/nginx/sites-enabled/vently
# sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ventfly.com www.ventfly.com api.ventfly.com;
    return 301 https://$host$request_uri;
}

# API — proxies to backend Docker container on port 8080
server {
    listen 443 ssl http2;
    server_name api.ventfly.com;

    ssl_certificate     /etc/letsencrypt/live/ventfly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventfly.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Frontend — proxies to frontend Docker container on port 3000
server {
    listen 443 ssl http2;
    server_name ventfly.com www.ventfly.com;

    ssl_certificate     /etc/letsencrypt/live/ventfly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventfly.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
