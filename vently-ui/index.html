<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/ventfly-logo.jpeg" />

    <!-- Title (IMPORTANT: keep under ~60 chars) -->
    <title>Ventfly | Volunteer Opportunities & Event Management Platform</title>

    <!-- Primary SEO -->
    <meta name="description" content="Discover volunteer opportunities, connect with event organizers, and manage events seamlessly with Ventfly. Join India's growing volunteer community today." />
    <meta name="keywords" content="volunteer opportunities India, event volunteers, NGO volunteers, event management platform, volunteering platform India, community service, student volunteering" />
    <meta name="author" content="Ventfly" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Canonical -->
    <link rel="canonical" href="https://ventfly.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/ventfly-logo.jpeg" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="Ventfly | Volunteer Opportunities & Events Platform" />
    <meta property="og:description" content="Find volunteer opportunities or recruit volunteers for your events. Start making an impact today with Ventfly." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ventfly.com/" />
    <meta property="og:image" content="https://ventfly.com/og-image.png" />
    <meta property="og:site_name" content="Ventfly" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ventfly | Volunteer & Event Platform" />
    <meta name="twitter:description" content="Connect with events, volunteer easily, and grow your impact with Ventfly." />
    <meta name="twitter:image" content="https://ventfly.com/og-image.png" />

    <!-- Theme Color (for mobile browsers) -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Preconnect (performance boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Structured Data (VERY IMPORTANT for SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ventfly",
        "url": "https://ventfly.com/",
        "description": "Platform to connect volunteers with event organizers and opportunities.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ventfly.com/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
